version: '3.8'

services:
  prometheus-config:
    image: alpine:latest
    container_name: prometheus-config
    env_file:
      - .env
    environment:
      - EC2_HOST=${EC2_HOST}
      - EC2_ACTUATOR_PROD_PORT=${EC2_ACTUATOR_PROD_PORT}
      - EC2_ACTUATOR_DEV_PORT=${EC2_ACTUATOR_DEV_PORT}
    volumes:
      - ./monitoring/prometheus:/prometheus-config
    command: >
      sh -c "apk add --no-cache gettext &&
             envsubst < /prometheus-config/prometheus.yml.template > /prometheus-config/prometheus.yml &&
             echo 'Prometheus config generated successfully'"
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
      - '--storage.tsdb.path=/prometheus'
    extra_hosts:
      - "ec2-server:${EC2_HOST}"
    networks:
      - monitoring
    depends_on:
      prometheus-config:
        condition: service_completed_successfully
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  monitoring:
    driver: bridge

volumes:
  grafana-data:
